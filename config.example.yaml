# TigrinhoDaCopa — non-secret settings (COMPLETION.md §4.2).
# Copy to config.yaml and fill in your Discord IDs. Secrets go in .env, NOT here.

# --- Required: your server's IDs (enable Developer Mode in Discord to copy them) ---
guild_id: 123456789012345678          # the server the bot serves
announce_channel_id: 123456789012345678  # channel for announcements & results
tigrinhos_role_id: 123456789012345678    # role pinged on announcements (notifications-only)
admin_user_id: 123456789012345678        # user DM'd on errors/limits

# --- Optional (defaults shown) ---
provider_mode: api_football            # api_football | fake (offline/local dev)
api_football_base_url: https://v3.football.api-sports.io
wc_league_id: 1                        # FIFA World Cup league id — VERIFY via /leagues
wc_season: 2026
timezone: America/Sao_Paulo            # display kickoffs, sync time, weekly reset
sync_time: "06:00"                     # daily fixtures sync (local time)
poll_interval_minutes: 1               # live-poll cadence during match windows (1 req/cycle, covers all games)
match_window_hours: 3                  # fast-poll window after kickoff
settle_grace_hours: 24                 # keep auto-settling a game until this long after kickoff (covers ET+pens, API lag)
stuck_recheck_minutes: 15              # recheck cadence for overdue games (past the fast window, within grace)
api_daily_cap: 3000                    # hard ceiling on provider requests per budget day (paid plan allows 7500)
api_budget_reset_tz: UTC               # tz whose midnight resets the request counter
db_path: /data/tigrinho.db             # SQLite file (mounted volume)
log_level: INFO
log_format: json                       # json | console
