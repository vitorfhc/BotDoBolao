[alembic]
# Migration scripts live inside the package (COMPLETION.md §5).
script_location = tigrinho/db/migrations
# Make the project importable when running `alembic` from the repo root.
prepend_sys_path = .
path_separator = os
# Placeholder only — the real URL is resolved at runtime in env.py
# (TIGRINHO_DB_URL env var, else the validated app config's db_path).
sqlalchemy.url = sqlite://
